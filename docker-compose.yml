services:
  postgres:
    image: postgres:15-alpine
    container_name: orchestrix-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestrix}
      POSTGRES_USER: ${POSTGRES_USER:-orchestrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orchestrix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api1:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: orchestrix-api1
    hostname: api1
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrix}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-orchestrix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_INSTANCE_NAME: api1
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api2:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: orchestrix-api2
    hostname: api2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrix}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-orchestrix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_INSTANCE_NAME: api2
    ports:
      - "8002:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: orchestrix-worker1
    hostname: worker1
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrix}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-orchestrix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_THREADS: ${WORKER_THREADS:-4}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      TASK_TIMEOUT: ${TASK_TIMEOUT:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: orchestrix-worker2
    hostname: worker2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrix}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-orchestrix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_THREADS: ${WORKER_THREADS:-4}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      TASK_TIMEOUT: ${TASK_TIMEOUT:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: orchestrix-worker3
    hostname: worker3
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrix}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-orchestrix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_THREADS: ${WORKER_THREADS:-4}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      TASK_TIMEOUT: ${TASK_TIMEOUT:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.watchdog
    container_name: orchestrix-watchdog
    hostname: watchdog
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrix}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-orchestrix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: orchestrix-dashboard
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: orchestrix-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - dashboard

volumes:
  postgres_data:
  redis_data:
