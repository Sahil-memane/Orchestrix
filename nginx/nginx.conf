events {
    worker_connections 1024;
}

http {
    upstream api_servers {
        server api1:8001;
        server api2:8001;
    }

    upstream dashboard_server {
        server dashboard:80;
    }

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name orchestrix.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # Secure HTTPS Server
    server {
        listen 443 ssl;
        server_name orchestrix.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/orchestrix.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orchestrix.duckdns.org/privkey.pem;

        # Serve Dashboard frontend
        location / {
            proxy_pass http://dashboard_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI API Tasks routing
        location /tasks {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Upstream-Addr $upstream_addr always;
        }

        # FastAPI API Metrics routing
        location /metrics {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Upstream-Addr $upstream_addr always;
        }

        # SSE (Server-Sent Events) mapping for tasks stream
        location /metrics/stream/tasks {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable proxy buffering for SSE stream to deliver events instantly
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Custom header to see which API container served the request
            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}
